<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Im Sorry Naziff ❤️</title>


<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

background:black;
overflow:hidden;
color:white;
font-family:Georgia,serif;

}



#startScreen{

position:fixed;
inset:0;

background:black;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

z-index:1000;

cursor:pointer;

}



#startScreen h1{

font-size:3em;

}



#lyrics{

position:absolute;

top:50%;

width:100%;

transform:translateY(-50%);

text-align:center;

font-size:2em;

}





.snowflake{

position:absolute;

color:white;

animation:fall linear infinite;

}



@keyframes fall{

from{
transform:translateY(-10vh);
}

to{
transform:translateY(110vh);
}

}






#ending{

position:fixed;

inset:0;

background:black;

display:none;

flex-direction:column;

justify-content:center;

align-items:center;

z-index:20;

}






#photoGallery{

display:flex;

gap:20px;

margin-bottom:40px;

opacity:0;

transition:2s;

}



#photoGallery.show{

opacity:1;

}



#photoGallery img{

width:180px;

height:180px;

object-fit:cover;

border-radius:15px;

}




#envelope{

position:relative;

width:320px;

height:200px;

background:#ff9fbc;

border-radius:15px;

overflow:visible;

}



#flap{

position:absolute;

top:0;

left:0;


border-left:160px solid transparent;

border-right:160px solid transparent;

border-top:120px solid #ff6f9c;

z-index:5;

}




#paper{

position:absolute;

left:10px;

bottom:20px;

width:300px;

min-height:220px;

background:white;

color:black;

padding:25px;

border-radius:12px;

transform:translateY(80px);

opacity:0;

transition:2s ease;

z-index:10;

}



#paper.open{

transform:translateY(-150px);

opacity:1;

}




#letterText{

text-align:center;

line-height:1.8;

white-space:pre-line;

}




#seal{

position:absolute;

top:80px;

left:135px;

width:50px;

height:50px;

background:#ff3366;

border-radius:50%;

display:flex;

align-items:center;

justify-content:center;

z-index:20;

}






#fireworks{

position:fixed;

inset:0;

pointer-events:none;

z-index:30;

}






#neonHeart{

position:fixed;

inset:0;

background:black;

display:none;

z-index:100;

}



#heartCanvas{

width:100%;

height:100%;

}



</style>


</head>




<body>





<div id="startScreen">

<h1>
❤️ Im Sorry Naziff
</h1>

<p>
Click Anywhere
</p>

</div>






<audio id="bgMusic" loop>

<source src="music.mp4" type="audio/mp4">

</audio>





<div id="lyrics"></div>






<div id="ending">



<div id="photoGallery">


<img src="photo1.jpg">

<img src="photo2.jpg">

<img src="photo3.jpg">


</div>






<div id="envelope">


<div id="paper">

<div id="letterText"></div>

</div>



<div id="flap"></div>



<div id="seal">

❤️

</div>


</div>


</div>






<canvas id="fireworks"></canvas>



<div id="neonHeart">

<canvas id="heartCanvas"></canvas>

</div>









<script>





const lyrics=[


{
text:"So, what if I call",
time:0
},

{
text:"And you pick up the phone?",
time:4.2
},

{
text:"And I use this holiday to make my way to your ghost",
time:8.5
},

{
text:"Or what if you're lonely",
time:16
},

{
text:"And you know I am too",
time:21
},

{
text:"And I get the chance to say",
time:25
},

{
text:"im sorry naziff, I miss you ❤️",
time:31
}


];






let box=document.getElementById("lyrics");

let current=-1;

let lastTime=0;

let endingShown=false;

let letterStarted=false;







function showLyrics(){


let music =
document.getElementById("bgMusic");



function sync(){


let now =
music.currentTime;



for(let i=0;i<lyrics.length;i++){


if(
now>=lyrics[i].time &&
now<(lyrics[i+1]?.time || 999)

){


if(current!==i){


box.innerHTML=
lyrics[i].text;


current=i;



if(i===lyrics.length-1){

lastTime=now;

}


}


}


}







if(
current===lyrics.length-1 &&
now>=lastTime+10 &&
!endingShown

){


box.innerHTML="";

showEnding();


}





requestAnimationFrame(sync);


}



sync();


}









function showEnding(){


if(endingShown)return;


endingShown=true;



document
.getElementById("ending")
.style.display="flex";



startFireworks();




setTimeout(()=>{

document
.getElementById("photoGallery")
.classList.add("show");


},500);






setTimeout(()=>{


document
.getElementById("paper")
.classList.add("open");


},8500);





setTimeout(()=>{


typeLetter();


},11000);





}









function typeLetter(){


if(letterStarted)return;


letterStarted=true;



const text=

`I'm sorry Naziff ❤️
Thank you for every memory, sayang.
Please give me another chance.
I hope we can be okay again ❤️`;



let target =
document.getElementById("letterText");



let i=0;



let timer=setInterval(()=>{


target.innerHTML +=
text.charAt(i);


i++;



if(i>=text.length){


clearInterval(timer);



setTimeout(()=>{


startNeonHeart();



},6000);



}



},60);



}









function createSnow(){


let snow =
document.createElement("div");


snow.className="snowflake";

snow.innerHTML="❅";


snow.style.left =
Math.random()*100+"vw";


snow.style.fontSize =
(10+Math.random()*20)+"px";


snow.style.animationDuration =
(4+Math.random()*6)+"s";



document.body.appendChild(snow);



setTimeout(()=>{

snow.remove();

},10000);


}



setInterval(createSnow,120);









const canvas =
document.getElementById("fireworks");


const ctx =
canvas.getContext("2d");



canvas.width=innerWidth;

canvas.height=innerHeight;



let particles=[];







function heartFirework(){


let x=Math.random()*canvas.width;


let y=Math.random()*canvas.height/2;



for(let i=0;i<80;i++){


let angle=Math.PI*2*i/80;



let hx=
16*Math.pow(Math.sin(angle),3);



let hy=-(

13*Math.cos(angle)

-5*Math.cos(2*angle)

-2*Math.cos(3*angle)

-Math.cos(4*angle)

);




particles.push({

x:x,

y:y,

vx:hx/8,

vy:hy/8,

life:100

});

}


}








function animateFirework(){


ctx.clearRect(
0,0,
canvas.width,
canvas.height
);



particles.forEach((p,index)=>{


p.x+=p.vx;

p.y+=p.vy;


p.life--;



ctx.font="20px serif";


ctx.fillText(
"❤️",
p.x,
p.y
);




if(p.life<=0){

particles.splice(index,1);

}



});



requestAnimationFrame(
animateFirework
);


}



animateFirework();








function startFireworks(){


setInterval(()=>{


heartFirework();


},1500);


}












/* NEON HEART */


const hCanvas =
document.getElementById("heartCanvas");


const hctx =
hCanvas.getContext("2d");



function resizeHeart(){

hCanvas.width=innerWidth;

hCanvas.height=innerHeight;

}


resizeHeart();


window.addEventListener(
"resize",
resizeHeart
);




let points=[];

let ttt=0;





function makeHeart(){


points=[];


for(let i=0;i<100;i++){


let t =
Math.PI*2*i/100;



let x=
16*Math.pow(Math.sin(t),3);



let y=-(

13*Math.cos(t)

-5*Math.cos(2*t)

-2*Math.cos(3*t)

-Math.cos(4*t)

);



points.push({

x:x*10,

y:y*10,

phase:Math.random()*10

});


}


}






function neonDraw(){


hctx.clearRect(
0,
0,
hCanvas.width,
hCanvas.height
);



ttt+=0.03;



let cx =
hCanvas.width/2;


let cy =
hCanvas.height/2;



points.forEach(p=>{


let pulse =
Math.sin(ttt+p.phase)*5;



hctx.save();



hctx.translate(
cx+p.x+pulse,
cy+p.y+pulse
);



hctx.font=
"bold 18px Arial";


hctx.textAlign="center";



hctx.shadowColor=
"#ff4fa3";


hctx.shadowBlur=25;


hctx.fillStyle=
"#ff7ed0";



hctx.fillText(
"I love u naziff",
0,
0
);



hctx.restore();



});



requestAnimationFrame(
neonDraw
);


}





function startNeonHeart(){


document
.getElementById("neonHeart")
.style.display="block";


makeHeart();


neonDraw();


}










document
.getElementById("startScreen")
.addEventListener("click",()=>{


let music =
document.getElementById("bgMusic");


music.currentTime=0;


music.play();



document
.getElementById("startScreen")
.style.display="none";



showLyrics();



},{once:true});





</script>


</body>

</html>
