<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Im Sorry Naziff ❤️</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    position: fixed;
    top: 0;
    left: 0;
    background: black;
    color: white;
    font-family: Georgia, serif;
    -webkit-user-select: none;
    user-select: none;
    -webkit-text-size-adjust: 100%;
}

/* ===== BACKGROUND STARS ===== */
#stars {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
}

.star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--duration) ease-in-out infinite alternate;
}

@keyframes twinkle {
    0% { opacity: 0.2; transform: scale(0.5); }
    100% { opacity: 1; transform: scale(1.2); }
}

/* ===== SHOOTING STARS ===== */
.shooting-star {
    position: absolute;
    width: 3px;
    height: 3px;
    background: white;
    border-radius: 50%;
    animation: shoot linear infinite;
    box-shadow: 0 0 20px rgba(255,255,255,0.8);
}

.shooting-star::after {
    content: '';
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 100px;
    height: 1px;
    background: linear-gradient(to left, rgba(255,255,255,0.8), transparent);
}

@keyframes shoot {
    0% {
        transform: translate(0, 0) rotate(-45deg);
        opacity: 0;
    }
    10% {
        opacity: 1;
    }
    90% {
        opacity: 1;
    }
    100% {
        transform: translate(-500px, 500px) rotate(-45deg);
        opacity: 0;
    }
}

/* ===== START SCREEN ===== */
#startScreen {
    position: fixed;
    inset: 0;
    background: black;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    cursor: pointer;
    touch-action: manipulation;
}

#startScreen h1 {
    font-size: clamp(2em, 6vw, 4em);
    text-align: center;
    padding: 0 20px;
    pointer-events: none;
    letter-spacing: 2px;
}

#startScreen h1 .heart-pulse {
    display: inline-block;
    animation: heartPulse 1.5s ease-in-out infinite;
    color: #ff3366;
    text-shadow: 0 0 30px rgba(255,50,100,0.5);
}

@keyframes heartPulse {
    0%, 100% { 
        transform: scale(1);
        text-shadow: 0 0 20px rgba(255,50,100,0.3), 0 0 40px rgba(255,50,100,0.1);
    }
    50% { 
        transform: scale(1.3);
        text-shadow: 0 0 40px rgba(255,50,100,0.8), 0 0 80px rgba(255,50,100,0.4), 0 0 120px rgba(255,50,100,0.2);
    }
}

#startScreen h1 .title-text {
    color: white;
    text-shadow: 0 0 20px rgba(255,255,255,0.2);
}

#startScreen p {
    margin-top: 30px;
    animation: pulse 2s infinite;
    font-size: clamp(1em, 2.5vw, 1.5em);
    color: #ff6f9c;
    pointer-events: none;
    padding: 15px 40px;
    background: rgba(255,100,150,0.1);
    border-radius: 50px;
    border: 1px solid rgba(255,100,150,0.3);
}

@keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.95); }
}

/* ===== LYRICS ===== */
#lyrics {
    position: absolute;
    top: 50%;
    width: 100%;
    transform: translateY(-50%);
    text-align: center;
    font-size: clamp(1.2em, 3.5vw, 2.5em);
    z-index: 10;
    text-shadow: 0 0 20px rgba(255,255,255,0.3);
    padding: 0 20px;
    pointer-events: none;
    line-height: 1.6;
    color: white;
}

/* ===== SNOWFLAKE KRISTAL CANTIK - 6 HUJUNG ===== */
.snowflake {
    position: absolute;
    pointer-events: none;
    will-change: transform;
    opacity: 0.9;
    animation: fall linear infinite;
}

.snowflake svg {
    display: block;
    width: 100%;
    height: 100%;
}

@keyframes fall {
    0% {
        transform: translateY(-10vh) translateX(0px) rotate(0deg);
        opacity: 0.9;
    }
    25% {
        transform: translateY(20vh) translateX(20px) rotate(90deg);
        opacity: 0.9;
    }
    50% {
        transform: translateY(50vh) translateX(-20px) rotate(180deg);
        opacity: 0.8;
    }
    75% {
        transform: translateY(80vh) translateX(20px) rotate(270deg);
        opacity: 0.7;
    }
    100% {
        transform: translateY(110vh) translateX(-10px) rotate(360deg);
        opacity: 0.2;
    }
}

/* ===== ENDING ===== */
#ending {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 20;
    padding: 20px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
}

/* ===== PHOTO GALLERY ===== */
#photoGallery {
    display: flex;
    gap: clamp(10px, 3vw, 30px);
    margin-bottom: clamp(20px, 5vh, 50px);
    opacity: 0;
    transition: 2s;
    flex-wrap: wrap;
    justify-content: center;
}

#photoGallery.show {
    opacity: 1;
}

#photoGallery img {
    width: clamp(100px, 20vw, 180px);
    height: clamp(100px, 20vw, 180px);
    object-fit: cover;
    border-radius: 15px;
    border: 2px solid rgba(255,100,150,0.3);
    box-shadow: 0 0 30px rgba(255,100,150,0.1);
    transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    pointer-events: none;
    -webkit-user-drag: none;
}

#photoGallery.show img:nth-child(1) {
    animation: photoPop 0.8s ease-out 0.5s both;
}
#photoGallery.show img:nth-child(2) {
    animation: photoPop 0.8s ease-out 0.8s both;
}
#photoGallery.show img:nth-child(3) {
    animation: photoPop 0.8s ease-out 1.1s both;
}

@keyframes photoPop {
    0% { transform: scale(0) rotate(-20deg); opacity: 0; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

/* ===== ENVELOPE ===== */
#envelopeContainer {
    animation: envelopeFloat 3s ease-in-out infinite;
    position: relative;
}

@keyframes envelopeFloat {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    25% { transform: translateY(-8px) rotate(-1deg); }
    75% { transform: translateY(-8px) rotate(1deg); }
}

#envelope {
    position: relative;
    width: clamp(280px, 40vw, 400px);
    height: clamp(180px, 25vw, 250px);
    background: linear-gradient(145deg, #ff9fbc, #ff7da8);
    border-radius: 15px;
    overflow: visible;
    box-shadow: 0 10px 40px rgba(255,100,150,0.3);
    animation: envelopePulse 2s ease-in-out infinite;
}

@keyframes envelopePulse {
    0%, 100% { box-shadow: 0 10px 40px rgba(255,100,150,0.3); }
    50% { box-shadow: 0 15px 60px rgba(255,100,150,0.5), 0 0 80px rgba(255,100,150,0.1); }
}

#flap {
    position: absolute;
    top: 0;
    left: 0;
    border-left: clamp(140px, 20vw, 200px) solid transparent;
    border-right: clamp(140px, 20vw, 200px) solid transparent;
    border-top: clamp(100px, 14vw, 150px) solid #ff6f9c;
    z-index: 5;
    transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
}

#paper {
    position: absolute;
    left: clamp(10px, 1.5vw, 20px);
    bottom: clamp(15px, 2vw, 25px);
    width: calc(100% - clamp(20px, 3vw, 40px));
    min-height: clamp(180px, 25vw, 280px);
    background: linear-gradient(180deg, #ffffff, #fff5f7);
    color: black;
    padding: clamp(15px, 2.5vw, 30px);
    border-radius: 12px;
    transform: translateY(80px) scale(0.9);
    opacity: 0;
    transition: all 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    z-index: 10;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
}

#paper.open {
    transform: translateY(clamp(-120px, -18vw, -200px)) scale(1);
    opacity: 1;
}

#letterText {
    text-align: center;
    line-height: 1.8;
    white-space: pre-line;
    font-size: clamp(12px, 1.5vw, 16px);
    color: #333;
}

#seal {
    position: absolute;
    top: clamp(70px, 10vw, 100px);
    left: 50%;
    transform: translateX(-50%);
    width: clamp(40px, 5vw, 60px);
    height: clamp(40px, 5vw, 60px);
    background: radial-gradient(circle at 30% 30%, #ff6b9d, #ff2d75);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
    font-size: clamp(18px, 2.5vw, 28px);
    box-shadow: 0 0 30px rgba(255,51,102,0.5);
    animation: sealPulse 2s infinite;
    pointer-events: none;
}

@keyframes sealPulse {
    0%, 100% { transform: translateX(-50%) scale(1); }
    50% { transform: translateX(-50%) scale(1.15); }
}

/* ===== FIREWORKS ===== */
#fireworks {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 30;
}

/* ===== NEON HEART ===== */
#neonHeart {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    z-index: 100;
}

#heartCanvas {
    width: 100%;
    height: 100%;
    display: block;
}

/* ===== FLOATING HEARTS ===== */
.floating-heart {
    position: fixed;
    pointer-events: none;
    z-index: 40;
    font-size: 30px;
    animation: floatUp linear forwards;
    opacity: 0;
}

@keyframes floatUp {
    0% { opacity: 0; transform: translateY(100vh) scale(0) rotate(0deg); }
    20% { opacity: 1; }
    100% { opacity: 0; transform: translateY(-10vh) scale(1.5) rotate(720deg); }
}

/* ===== RESPONSIVE ===== */
@media (max-width: 1024px) and (orientation: portrait) {
    #lyrics { font-size: 1.8em; }
    #photoGallery img { width: 150px; height: 150px; }
}

@media (max-width: 768px) {
    #lyrics { font-size: 1.2em; }
    #photoGallery img { width: 120px; height: 120px; }
}

@media (max-width: 480px) {
    #lyrics { font-size: 1em; }
    #photoGallery img { width: 100px; height: 100px; }
    #envelope { width: 260px; height: 170px; }
}

</style>

</head>

<body>

<!-- ===== STARS ===== -->
<div id="stars"></div>

<!-- ===== START SCREEN ===== -->
<div id="startScreen">
    <h1>
        <span class="heart-pulse">❤️</span>
        <span class="title-text">Im Sorry Naziff</span>
    </h1>
    <p>👆 Tap to Start</p>
</div>

<!-- ===== AUDIO ===== -->
<audio id="bgMusic" loop preload="auto" playsinline webkit-playsinline>
    <source src="music.m4a" type="audio/mp4">
    <source src="music.mp3" type="audio/mpeg">
    <source src="music.mp4" type="audio/mp4">
</audio>

<!-- ===== LYRICS ===== -->
<div id="lyrics"></div>

<!-- ===== ENDING ===== -->
<div id="ending">
    <div id="photoGallery">
        <img src="photo1.jpg" alt="Memory 1" draggable="false">
        <img src="photo2.jpg" alt="Memory 2" draggable="false">
        <img src="photo3.jpg" alt="Memory 3" draggable="false">
    </div>
    <div id="envelopeContainer">
        <div id="envelope">
            <div id="paper">
                <div id="letterText"></div>
            </div>
            <div id="flap"></div>
            <div id="seal">❤️</div>
        </div>
    </div>
</div>

<!-- ===== FIREWORKS ===== -->
<canvas id="fireworks"></canvas>

<!-- ===== NEON HEART ===== -->
<div id="neonHeart">
    <canvas id="heartCanvas"></canvas>
</div>

<script>

// ============================================
// STARS
// ============================================
function createStars() {
    const container = document.getElementById('stars');
    for (let i = 0; i < 150; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const size = Math.random() * 3 + 1;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.setProperty('--duration', (2 + Math.random() * 3) + 's');
        star.style.animationDelay = Math.random() * 3 + 's';
        container.appendChild(star);
    }
}
createStars();

// ============================================
// SHOOTING STARS
// ============================================
function createShootingStar() {
    const star = document.createElement('div');
    star.className = 'shooting-star';
    star.style.left = Math.random() * 80 + '%';
    star.style.top = Math.random() * 30 + '%';
    star.style.animationDuration = (2 + Math.random() * 2) + 's';
    star.style.animationDelay = Math.random() * 5 + 's';
    document.body.appendChild(star);
    setTimeout(() => star.remove(), 4000);
}
setInterval(createShootingStar, 3000);

// ============================================
// FLOATING HEARTS
// ============================================
let floatingHeartInterval = null;

function startFloatingHearts() {
    if (floatingHeartInterval) return;
    floatingHeartInterval = setInterval(() => {
        const heart = document.createElement('div');
        heart.className = 'floating-heart';
        heart.innerHTML = ['❤️', '💕', '💗'][Math.floor(Math.random() * 3)];
        heart.style.left = Math.random() * 100 + '%';
        heart.style.fontSize = (20 + Math.random() * 30) + 'px';
        heart.style.animationDuration = (8 + Math.random() * 6) + 's';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 14000);
    }, 800);
}

function stopFloatingHearts() {
    if (floatingHeartInterval) {
        clearInterval(floatingHeartInterval);
        floatingHeartInterval = null;
    }
    document.querySelectorAll('.floating-heart').forEach(el => el.remove());
}

// ============================================
// LYRICS
// ============================================
const lyricsData = [
    {text: "So, what if I call", time: 0},
    {text: "And you pick up the phone?", time: 4.2},
    {text: "And I use this holiday to make my way to your ghost", time: 8.5},
    {text: "Or what if you're lonely", time: 16},
    {text: "And you know I am too", time: 21},
    {text: "And I get the chance to say", time: 25},
    {text: "im sorry naziff, I miss you ❤️", time: 31}
];

let box = document.getElementById("lyrics");
let current = -1;
let lastTime = 0;
let endingShown = false;
let letterStarted = false;
let syncId = null;
let snowInterval = null;
let musicStarted = false;
let fireworksInterval = null;

// ============================================
// SNOWFLAKE KRISTAL SVG
// ============================================
function createSnowflakeSVG(size) {
    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("viewBox", "-50 -50 100 100");
    svg.setAttribute("width", size);
    svg.setAttribute("height", size);
    
    const color = "rgba(255,255,255,0.95)";
    const armLength = 40;
    const branchLength = 18;
    
    for (let i = 0; i < 6; i++) {
        const angle = (i * 60) * Math.PI / 180;
        const x = Math.cos(angle) * armLength;
        const y = Math.sin(angle) * armLength;
        
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", "0");
        line.setAttribute("y1", "0");
        line.setAttribute("x2", x);
        line.setAttribute("y2", y);
        line.setAttribute("stroke", color);
        line.setAttribute("stroke-width", "3");
        line.setAttribute("stroke-linecap", "round");
        svg.appendChild(line);
        
        for (let j = -1; j <= 1; j+=2) {
            const branchAngle = angle + (j * 50 * Math.PI / 180);
            const branchX = x * 0.6;
            const branchY = y * 0.6;
            const branchEndX = branchX + Math.cos(branchAngle) * branchLength;
            const branchEndY = branchY + Math.sin(branchAngle) * branchLength;
            
            const branch = document.createElementNS("http://www.w3.org/2000/svg", "line");
            branch.setAttribute("x1", branchX);
            branch.setAttribute("y1", branchY);
            branch.setAttribute("x2", branchEndX);
            branch.setAttribute("y2", branchEndY);
            branch.setAttribute("stroke", color);
            branch.setAttribute("stroke-width", "2");
            branch.setAttribute("stroke-linecap", "round");
            svg.appendChild(branch);
        }
        
        const diamond = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        diamond.setAttribute("cx", x);
        diamond.setAttribute("cy", y);
        diamond.setAttribute("r", "3");
        diamond.setAttribute("fill", color);
        svg.appendChild(diamond);
    }
    
    const center = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    center.setAttribute("cx", "0");
    center.setAttribute("cy", "0");
    center.setAttribute("r", "6");
    center.setAttribute("fill", color);
    svg.appendChild(center);
    
    for (let i = 0; i < 6; i++) {
        const angle = (i * 60 + 30) * Math.PI / 180;
        const dotX = Math.cos(angle) * 25;
        const dotY = Math.sin(angle) * 25;
        const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        dot.setAttribute("cx", dotX);
        dot.setAttribute("cy", dotY);
        dot.setAttribute("r", "1.5");
        dot.setAttribute("fill", color);
        svg.appendChild(dot);
    }
    
    return svg;
}

function createSnow() {
    const snowflake = document.createElement('div');
    snowflake.className = 'snowflake';
    const size = 25 + Math.random() * 35;
    const svg = createSnowflakeSVG(size);
    snowflake.appendChild(svg);
    snowflake.style.left = Math.random() * 100 + 'vw';
    snowflake.style.width = size + 'px';
    snowflake.style.height = size + 'px';
    snowflake.style.animationDuration = (8 + Math.random() * 14) + 's';
    snowflake.style.opacity = 0.3 + Math.random() * 0.6;
    document.body.appendChild(snowflake);
    setTimeout(() => snowflake.remove(), 22000);
}

// ============================================
// MAIN FUNCTIONS
// ============================================
function showLyrics() {
    let music = document.getElementById("bgMusic");
    
    function sync() {
        let now = music.currentTime;
        
        for (let i = 0; i < lyricsData.length; i++) {
            if (now >= lyricsData[i].time && now < (lyricsData[i+1]?.time || 999)) {
                if (current !== i) {
                    box.innerHTML = lyricsData[i].text;
                    current = i;
                    if (i === lyricsData.length - 1) {
                        lastTime = now;
                    }
                }
            }
        }
        
        if (current === lyricsData.length - 1 && now >= lastTime + 10 && !endingShown) {
            box.innerHTML = "";
            showEnding();
        }
        
        syncId = requestAnimationFrame(sync);
    }
    
    sync();
}

function showEnding() {
    if (endingShown) return;
    endingShown = true;
    
    stopFloatingHearts();
    
    document.getElementById("ending").style.display = "flex";
    startFireworks();
    
    setTimeout(() => {
        document.getElementById("photoGallery").classList.add("show");
    }, 500);
    
    setTimeout(() => {
        document.getElementById("paper").classList.add("open");
    }, 8500);
    
    setTimeout(() => {
        typeLetter();
    }, 11000);
}

function typeLetter() {
    if (letterStarted) return;
    letterStarted = true;
    
    setTimeout(() => {
        startFloatingHearts();
    }, 1000);
    
    const text = `I'm sorry Naziff ❤️\nThank you for every memory, sayang.\nPlease give me another chance.\nI hope we can be okay again ❤️`;
    let target = document.getElementById("letterText");
    let i = 0;
    
    let timer = setInterval(() => {
        target.innerHTML += text.charAt(i);
        i++;
        if (i >= text.length) {
            clearInterval(timer);
            setTimeout(() => {
                startNeonHeart();
            }, 8000);
        }
    }, 40);
}

// ============================================
// FIREWORKS
// ============================================
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function heartFirework() {
    let x = Math.random() * canvas.width;
    let y = Math.random() * canvas.height / 2;
    
    for (let i = 0; i < 80; i++) {
        let angle = Math.PI * 2 * i / 80;
        let hx = 16 * Math.pow(Math.sin(angle), 3);
        let hy = -(13 * Math.cos(angle) - 5 * Math.cos(2 * angle) - 2 * Math.cos(3 * angle) - Math.cos(4 * angle));
        
        particles.push({
            x: x,
            y: y,
            vx: hx / 8,
            vy: hy / 8,
            life: 100
        });
    }
}

function animateFirework() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    particles.forEach((p, index) => {
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        ctx.font = "20px serif";
        ctx.textAlign = "center";
        ctx.fillText("❤️", p.x, p.y);
        if (p.life <= 0) {
            particles.splice(index, 1);
        }
    });
    
    requestAnimationFrame(animateFirework);
}
animateFirework();

function startFireworks() {
    if (fireworksInterval) clearInterval(fireworksInterval);
    fireworksInterval = setInterval(() => {
        heartFirework();
    }, 1500);
}

// ============================================
// NEON HEART
// ============================================
const hCanvas = document.getElementById("heartCanvas");
const hctx = hCanvas.getContext("2d");

function resizeHeart() {
    hCanvas.width = window.innerWidth;
    hCanvas.height = window.innerHeight;
}
resizeHeart();
window.addEventListener("resize", resizeHeart);

let points = [];
let ttt = 0;

function makeHeart() {
    points = [];
    for (let i = 0; i < 160; i++) {
        let t = Math.PI * 2 * i / 160;
        let x = 16 * Math.pow(Math.sin(t), 3);
        let y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
        points.push({
            x: x * 18,
            y: y * 18,
            phase: Math.random() * 10
        });
    }
}

function neonDraw() {
    hctx.clearRect(0, 0, hCanvas.width, hCanvas.height);
    ttt += 0.03;
    let cx = hCanvas.width / 2;
    let cy = hCanvas.height / 2;
    
    points.forEach(p => {
        let pulse = Math.sin(ttt + p.phase) * 5;
        hctx.save();
        hctx.translate(cx + p.x + pulse, cy + p.y + pulse);
        hctx.font = "bold 22px Arial";
        hctx.textAlign = "center";
        hctx.shadowColor = "#ff4fa3";
        hctx.shadowBlur = 35;
        hctx.fillStyle = "#ff7ed0";
        hctx.fillText("I love u Naziff", 0, 0);
        hctx.restore();
    });
    requestAnimationFrame(neonDraw);
}

function startNeonHeart() {
    stopFloatingHearts();
    document.getElementById("neonHeart").style.display = "block";
    makeHeart();
    neonDraw();
}

// ============================================
// START APP - FIXED!
// ============================================
function startApp(e) {
    if (e) e.preventDefault();
    if (musicStarted) return;
    musicStarted = true;
    
    let music = document.getElementById("bgMusic");
    
    music.play().catch(() => {
        document.addEventListener('touchstart', function retry() {
            music.play().catch(() => {});
            document.removeEventListener('touchstart', retry);
        }, {once: true});
    });
    
    document.getElementById("startScreen").style.display = "none";
    showLyrics();
    
    // Start snow
    snowInterval = setInterval(createSnow, 100);
}

// EVENT LISTENERS - FIXED!
document.getElementById("startScreen").addEventListener("click", startApp, {once: true});
document.getElementById("startScreen").addEventListener("touchstart", function(e) {
    e.preventDefault();
    startApp(e);
}, {once: true, passive: false});

// ============================================
// RESIZE
// ============================================
window.addEventListener('resize', function() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    resizeHeart();
    document.body.style.height = window.innerHeight + 'px';
});

// ============================================
// CLEANUP
// ============================================
window.addEventListener('beforeunload', function() {
    if (syncId) cancelAnimationFrame(syncId);
    if (snowInterval) clearInterval(snowInterval);
    if (fireworksInterval) clearInterval(fireworksInterval);
    if (floatingHeartInterval) clearInterval(floatingHeartInterval);
});

console.log("❤️ Full version ready! Tap to Start works! ❤️");
</script>
