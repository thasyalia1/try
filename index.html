<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💔 Maaf & Tarikh ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #fce4ec 0%, #f8bbd0 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .card {
            max-width: 700px;
            width: 100%;
            background: rgba(255, 245, 247, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 60px 60px 60px 60px;
            box-shadow: 0 30px 50px rgba(180, 60, 80, 0.25), 0 10px 20px rgba(0,0,0,0.1);
            padding: 35px 30px 45px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: 0.3s ease;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            color: #880e4f;
            letter-spacing: -0.5px;
            margin-top: 5px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        h1 span {
            background: #f06292;
            color: white;
            font-size: 1.8rem;
            padding: 0 18px;
            border-radius: 100px;
            line-height: 1.4;
        }

        .subhead {
            font-size: 1.3rem;
            color: #ad1457;
            background: rgba(255, 255, 255, 0.6);
            display: inline-block;
            padding: 10px 30px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            margin-bottom: 25px;
            font-weight: 500;
            border: 1px solid #f8bbd0;
            box-shadow: 0 4px 8px rgba(233, 30, 99, 0.08);
        }

        .message-box {
            background: #ffffffcc;
            backdrop-filter: blur(8px);
            padding: 25px 20px;
            border-radius: 60px 20px 60px 20px;
            margin: 20px 0 30px;
            box-shadow: inset 0 2px 8px rgba(136, 14, 79, 0.08), 0 12px 24px rgba(233, 30, 99, 0.12);
            border-left: 6px solid #ec407a;
            border-right: 6px solid #f48fb1;
            transition: 0.2s;
        }

        .message-box p {
            font-size: 1.35rem;
            line-height: 1.7;
            color: #4a1a2c;
            font-weight: 500;
            margin: 0;
        }

        .message-box .heart-break {
            font-size: 2rem;
            display: inline-block;
            margin: 0 4px;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin: 35px 0 20px;
        }

        .btn {
            background: white;
            border: none;
            padding: 16px 35px;
            border-radius: 100px;
            font-size: 1.3rem;
            font-weight: 600;
            color: #880e4f;
            box-shadow: 0 8px 18px rgba(233, 30, 99, 0.2);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 2px solid transparent;
            flex: 1 0 auto;
            justify-content: center;
            min-width: 140px;
            background: #ffffff;
        }

        .btn-primary {
            background: #ec407a;
            color: white;
            box-shadow: 0 8px 18px #ec407a55;
            border-color: #ec407a;
        }

        .btn-primary:hover {
            background: #d81b60;
            transform: scale(1.04);
            box-shadow: 0 12px 28px #d81b60aa;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #ec407a;
            color: #880e4f;
        }

        .btn-outline:hover {
            background: #ec407a10;
            transform: scale(1.03);
            border-color: #d81b60;
            box-shadow: 0 8px 18px #ec407a30;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn i {
            font-size: 1.5rem;
        }

        .date-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 100px 20px 100px 20px;
            padding: 20px 25px;
            margin: 20px 0 10px;
            border: 1px solid #f8bbd0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 15px 25px;
            transition: 0.3s;
        }

        .date-card .date-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.2rem;
            color: #4a1a2c;
            background: white;
            padding: 5px 18px 5px 12px;
            border-radius: 60px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .date-card .date-item i {
            font-size: 1.7rem;
        }

        .emoji-big {
            font-size: 2.4rem;
            line-height: 1;
        }

        .footer-note {
            margin-top: 30px;
            font-size: 1.1rem;
            color: #ad1457;
            background: rgba(255, 255, 255, 0.5);
            padding: 12px 20px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            display: inline-block;
            border: 1px solid #f48fb1;
        }

        /* interactive feedback */
        .popup-feedback {
            background: #880e4f;
            color: white;
            border-radius: 80px;
            padding: 12px 28px;
            font-size: 1.2rem;
            font-weight: 600;
            display: inline-block;
            margin: 10px auto 0;
            box-shadow: 0 8px 20px #880e4f55;
            transition: 0.2s;
        }

        /* hidden class */
        .hidden {
            display: none !important;
        }

        .shake-animation {
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(6deg); }
            50% { transform: rotate(-6deg); }
            75% { transform: rotate(4deg); }
            100% { transform: rotate(0deg); }
        }

        @media (max-width: 550px) {
            .card { padding: 25px 18px; }
            h1 { font-size: 2.2rem; }
            .message-box p { font-size: 1.2rem; }
            .btn { font-size: 1.1rem; padding: 14px 20px; min-width: 120px; }
        }
    </style>
</head>
<body>
    <div class="card" id="mainCard">

        <h1>
            <span>💖</span> Sayang <span>❤️</span>
        </h1>
        <div class="subhead">
            ✨ untuk BF tersayang ✨
        </div>

        <!-- mesej permintaan maaf + ajak date -->
        <div class="message-box" id="messageBox">
            <p>
                <span class="heart-break">😢</span> 
                Maafkan saya, sayang. Saya rindu sangat nak jumpa awak.
                <span class="heart-break">🥺</span>
                <br>
                <span style="display: inline-block; margin-top: 12px; background: #fce4ec; padding: 6px 20px; border-radius: 60px; font-size: 1.1rem;">
                    Jom kita date? 🍕🎬
                </span>
            </p>
        </div>

        <!-- pilihan interaktif -->
        <div class="btn-group">
            <button class="btn btn-primary" id="forgiveBtn">
                <i>❤️</i> Maafkan
            </button>
            <button class="btn btn-outline" id="dateBtn">
                <i>🌹</i> Nak Date!
            </button>
        </div>

        <!-- feedback / respons -->
        <div id="feedbackArea" class="hidden popup-feedback">
            💞 Terima kasih sayang!
        </div>

        <!-- cadangan tarikh (interaktif) -->
        <div class="date-card" id="dateSuggestion">
            <span class="date-item">
                <i>📅</i> Sabtu ini
            </span>
            <span class="date-item">
                <i>⏰</i> 7 malam
            </span>
            <span class="date-item">
                <i>📍</i> Tempat kegemaran kita
            </span>
        </div>

        <div class="footer-note">
            <span>✨ I love you, maafkan saya ✨</span>
        </div>

        <!-- mesej rahsia (akan muncul bila klik) -->
        <div id="secretMessage" class="hidden" style="margin-top: 20px; font-size: 1.5rem; background: #f48fb120; border-radius: 60px; padding: 10px 20px; border: 1px dashed #ec407a;">
            💋 You are my everything 💋
        </div>
    </div>

    <script>
        (function() {
            "use strict";

            // elemen
            const forgiveBtn = document.getElementById('forgiveBtn');
            const dateBtn = document.getElementById('dateBtn');
            const feedbackArea = document.getElementById('feedbackArea');
            const secretMsg = document.getElementById('secretMessage');
            const dateSuggestion = document.getElementById('dateSuggestion');
            const messageBox = document.getElementById('messageBox');

            // fungsi untuk tunjuk feedback & animasi
            function showFeedback(text, emoji = '💖') {
                feedbackArea.classList.remove('hidden');
                feedbackArea.innerHTML = `${emoji} ${text} ${emoji}`;
                // tambah animasi goncang pada mesej box
                messageBox.classList.add('shake-animation');
                setTimeout(() => {
                    messageBox.classList.remove('shake-animation');
                }, 450);
                // sembunyi selepas 5 saat (tapi kekal jika user klik lagi)
                clearTimeout(window.feedbackTimeout);
                window.feedbackTimeout = setTimeout(() => {
                    feedbackArea.classList.add('hidden');
                }, 5000);
            }

            // Butang "Maafkan"
            forgiveBtn.addEventListener('click', function(e) {
                e.preventDefault();
                // tukar mesej box kepada mesej maaf + sayang
                messageBox.innerHTML = `
                    <p>
                        <span class="heart-break">🥰</span> 
                        Awak maafkan saya? Terima kasih sayang! saya sayang awak sangat.
                        <span class="heart-break">❤️</span>
                        <br>
                        <span style="display: inline-block; margin-top: 12px; background: #fce4ec; padding: 6px 20px; border-radius: 60px; font-size: 1.1rem;">
                            Jom kita pergi date! 🍕🎬
                        </span>
                    </p>
                `;
                // tunjuk feedback
                showFeedback('Awak maafkan saya! Terima kasih!', '❤️');
                // tunjuk mesej rahsia
                secretMsg.classList.remove('hidden');
                // ubah sedikit date suggestion (tambah hati)
                dateSuggestion.innerHTML = `
                    <span class="date-item">
                        <i>❤️</i> Sabtu ini
                    </span>
                    <span class="date-item">
                        <i>⏰</i> 7 malam
                    </span>
                    <span class="date-item">
                        <i>📍</i> Tempat istimewa kita
                    </span>
                `;
                // tambah efek emoji
                forgiveBtn.innerHTML = `<i>❤️</i> Maafkan (dah)`;
                forgiveBtn.style.background = '#d81b60';
                forgiveBtn.style.borderColor = '#d81b60';
                forgiveBtn.style.color = 'white';
                // disable button sikit (tapi boleh klik lagi)
                forgiveBtn.disabled = false; // biar boleh repeat
            });

            // Butang "Nak Date!"
            dateBtn.addEventListener('click', function(e) {
                e.preventDefault();
                // ubah mesej box jadi lebih bersemangat
                messageBox.innerHTML = `
                    <p>
                        <span class="heart-break">🥳</span> 
                        Yess! Saya nak sangat date dengan awak!
                        <span class="heart-break">💕</span>
                        <br>
                        <span style="display: inline-block; margin-top: 12px; background: #fce4ec; padding: 6px 20px; border-radius: 60px; font-size: 1.1rem;">
                            Jom kita pergi makan malam romantik! 🌹
                        </span>
                    </p>
                `;
                showFeedback('Date! Date! Saya tunggu awak!', '🌹');
                // munculkan mesej rahsia
                secretMsg.classList.remove('hidden');
                // ubah date suggestion dengan lebih detail
                dateSuggestion.innerHTML = `
                    <span class="date-item">
                        <i>🌹</i> Sabtu, 8 malam
                    </span>
                    <span class="date-item">
                        <i>🍝</i> Makan malam
                    </span>
                    <span class="date-item">
                        <i>🎬</i> Filem romantik
                    </span>
                `;
                // ubah butang date
                dateBtn.innerHTML = `<i>🌹</i> Date! siap!`;
                dateBtn.style.background = '#d81b60';
                dateBtn.style.color = 'white';
                dateBtn.style.borderColor = '#d81b60';
                // buat efek kejutan
                dateSuggestion.style.background = '#fce4ec';
                setTimeout(() => {
                    dateSuggestion.style.background = 'rgba(255, 255, 255, 0.7)';
                }, 800);
            });

            // tambah interaksi: klik pada mesej box untuk effect (fun)
            messageBox.addEventListener('click', function() {
                // tukar mesej ke minta maaf + sayang (random)
                const messages = [
                    `😘 Maaf sayang, saya janji akan buat awak bahagia.`,
                    `🥺 Saya rindu sangat, maafkan saya. Jom date?`,
                    `❤️ Maaf, saya sayang awak lebih dari segalanya.`,
                    `💞 Awak adalah segalanya untuk saya. Maaf & saya nak date awak!`
                ];
                const randomMsg = messages[Math.floor(Math.random() * messages.length)];
                messageBox.innerHTML = `
                    <p>
                        <span class="heart-break">💌</span> 
                        ${randomMsg}
                        <span class="heart-break">💖</span>
                    </p>
                `;
                // tambah efek kecil
                messageBox.style.transform = 'scale(0.98)';
                setTimeout(() => messageBox.style.transform = 'scale(1)', 150);
            });

            // tambah interaksi pada date suggestion (klik untuk ubah)
            dateSuggestion.addEventListener('click', function() {
                const suggestions = [
                    `<span class="date-item"><i>📅</i> Jumaat malam</span>
                     <span class="date-item"><i>⏰</i> 8:30 malam</span>
                     <span class="date-item"><i>📍</i> Kafe kegemaran kita</span>`,
                    `<span class="date-item"><i>🌹</i> Sabtu, 7 malam</span>
                     <span class="date-item"><i>🍣</i> Makan Jepun</span>
                     <span class="date-item"><i>🎶</i> Live music</span>`,
                    `<span class="date-item"><i>💖</i> Ahad, 6 petang</span>
                     <span class="date-item"><i>☕</i> Kopi & kek</span>
                     <span class="date-item"><i>🌅</i> Sunset view</span>`
                ];
                const randomSuggestion = suggestions[Math.floor(Math.random() * suggestions.length)];
                dateSuggestion.innerHTML = randomSuggestion;
                // efek
                dateSuggestion.style.background = '#f8bbd0';
                setTimeout(() => {
                    dateSuggestion.style.background = 'rgba(255, 255, 255, 0.7)';
                }, 400);
                // feedback ringkas
                showFeedback('Pilihan tarikh baru!', '✨');
            });

            // reset feedback jika user klik area luar (optional)
            document.addEventListener('click', function(e) {
                // jika klik di luar card, tak buat apa
                // tapi kita biarkan
            });

            // init: sembunyikan mesej rahsia pada mulanya
            secretMsg.classList.add('hidden');
            // feedback hidden
            feedbackArea.classList.add('hidden');
            // additional: jika user klik butang "maafkan" lebih dari sekali, ia akan terus berfungsi
            // tapi kita reset butang date jika perlu

            console.log('❤️ Laman web untuk BF: Maaf & Tarikh ❤️');
        })();
    </script>
</body>
</html>
